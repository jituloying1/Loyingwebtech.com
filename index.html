<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIOMATICS MOTORS Billing</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#0f172a;
    font-size:35px;
}

.logo p{
    color:#555;
    margin-top:5px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#111827;
}

input, select{
    width:100%;
    padding:12px;
    border:2px solid #cbd5e1;
    border-radius:10px;
    font-size:16px;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-top:20px;
}

.service-card{
    border:2px solid #cbd5e1;
    padding:15px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
}

.service-card:hover{
    transform:translateY(-3px);
    border-color:#2563eb;
}

.service-card input{
    width:auto;
    margin-right:10px;
}

.service-name{
    font-size:17px;
    font-weight:bold;
    color:#111827;
}

.price{
    color:#16a34a;
    font-size:18px;
    margin-top:5px;
}

.bill-box{
    margin-top:30px;
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
}

.bill-box h2{
    margin-bottom:15px;
    color:#0f172a;
}

.total{
    font-size:28px;
    font-weight:bold;
    color:#dc2626;
    margin-top:15px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

button{
    flex:1;
    min-width:200px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.print-btn{
    background:#16a34a;
}

.print-btn:hover{
    background:#15803d;
}

@media(max-width:600px){
    .container{
        padding:20px;
    }

    .logo h1{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
    <h1>VIOMATICS MOTORS</h1>
    <p>Professional Vehicle Washing & Service Billing</p>
</div>

<div class="form-group">
    <label>Customer Name</label>
    <input type="text" id="customerName" placeholder="Enter customer name">
</div>

<div class="form-group">
    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter customer phone number">
</div>

<div class="form-group">
    <label>Select Vehicle</label>
    <select id="vehicle" onchange="loadServices()">
        <option value="">-- Select Vehicle --</option>
        <option value="car">Car</option>
        <option value="bike">Bike / Scooter</option>
        <option value="tractor">Tractor</option>
    </select>
</div>

<div id="servicesContainer" class="services"></div>

<div class="bill-box">
    <h2>Billing Summary</h2>
    <div id="billDetails">No services selected</div>
    <div class="total">Total: ₹<span id="totalAmount">0</span></div>
</div>

<div class="buttons">
    <button class="print-btn" onclick="window.print()">Print Bill</button>
    <button onclick="sendWhatsApp()">Send WhatsApp Bill</button>
</div>

</div>

<script>
const serviceData = {
    car:[
        {name:'Premium Full Wash (Foam + Vacuum)',price:300},
        {name:'Interior Polishing',price:50},
        {name:'Exterior Polishing',price:100},
        {name:'Quick Exterior Wash (15 mins)',price:100},
        {name:'Vacuuming Only',price:50}
    ],

    tractor:[
        {name:'Premium Full Wash (Foam + Vacuum)',price:300},
        {name:'Interior Polishing',price:50},
        {name:'Exterior Polishing',price:100},
        {name:'Quick Exterior Wash (15 mins)',price:100},
        {name:'Vacuuming Only',price:50}
    ],

    bike:[
        {name:'Wash',price:70},
        {name:'Polishing',price:30}
    ]
};

function loadServices(){
    const vehicle = document.getElementById('vehicle').value;
    const container = document.getElementById('servicesContainer');

    container.innerHTML = '';

    if(!vehicle) return;

    serviceData[vehicle].forEach((service,index)=>{
        container.innerHTML += `
            <label class="service-card">
                <div>
                    <input type="checkbox" value="${service.price}" data-name="${service.name}" onchange="calculateTotal()">
                    <span class="service-name">${service.name}</span>
                </div>
                <div class="price">₹${service.price}</div>
            </label>
        `;
    });

    calculateTotal();
}

function calculateTotal(){
    const checkboxes = document.querySelectorAll('.service-card input[type="checkbox"]:checked');
    let total = 0;
    let details = '';

    checkboxes.forEach(box=>{
        total += parseInt(box.value);
        details += `<p>${box.dataset.name} - ₹${box.value}</p>`;
    });

    document.getElementById('totalAmount').innerText = total;
    document.getElementById('billDetails').innerHTML = details || 'No services selected';
}

function sendWhatsApp(){
    const name = document.getElementById('customerName').value;
    const phone = document.getElementById('phone').value;
    const vehicle = document.getElementById('vehicle').value;
    const total = document.getElementById('totalAmount').innerText;

    const selected = document.querySelectorAll('.service-card input[type="checkbox"]:checked');

    if(!name || !phone || !vehicle || selected.length === 0){
        alert('Please complete all billing details');
        return;
    }

    let serviceList = '';

    selected.forEach((item,index)=>{
        serviceList += `${index+1}. ${item.dataset.name} - ₹${item.value}%0A`;
    });

    const message = `*VIOMATICS MOTORS BILL*%0A%0ACustomer Name: ${name}%0APhone: ${phone}%0AVehicle: ${vehicle}%0A%0AServices:%0A${serviceList}%0ATotal Amount: ₹${total}%0A%0AThank You For Visiting VIOMATICS MOTORS`;

    // Send to customer WhatsApp
    window.open(`https://wa.me/91${phone}?text=${message}`,'_blank');

    // Open WhatsApp Group Invite
    setTimeout(()=>{
        window.open('https://chat.whatsapp.com/JfaU0QmrDkf3AhQbmxE7n2','_blank');
    },1000);
}
</script>

</body>
</html>
